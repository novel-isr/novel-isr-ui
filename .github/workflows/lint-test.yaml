name: Lint and Test

# 触发：所有分支 push + PR 到 main/develop。
# 走 Git URL 路线,不发 npm —— CI 仅做"代码可构建/类型干净"验证。
# tag push (v*.*.*) 不重复跑(消费方装包时 prepare 会自己再 build 一次)。

on:
  push:
    branches: ['**']
    tags-ignore: ['**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      # corepack 把 packageManager 字段当 source of truth,确保所有 pnpm
      # 子进程(包括装 git deps 时跑 prepare 的子 install)都用 setup-node
      # 设置的 Node 版本,而非 runner system 默认 Node。
      - name: Enable corepack (pnpm via packageManager)
        run: corepack enable pnpm

      - name: Diagnostics
        run: |
          node --version
          pnpm --version
          which node
          which pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run type-check

      - name: Test (vitest, passWithNoTests)
        run: pnpm run test

      - name: Build (vite lib + sass)
        run: pnpm run build
